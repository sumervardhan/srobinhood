name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/ci?schema=public"
  # NextAuth only uses NEXTAUTH_SECRET at runtime (session signing), not at build time.
  # Hardcoded so Dependabot PRs (which have no access to repo secrets) don't fail the build.
  NEXTAUTH_SECRET: "ci-placeholder-not-used-at-build-time"
  NEXTAUTH_URL: "http://localhost:3000"
  # Bypass Google OAuth credential check during CI builds (no real auth needed at build time).
  ALLOW_DEV_LOGIN: "true"

jobs:
  validate:
    name: Lint · Type-check · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      # Cache the Next.js build cache across runs for faster incremental builds
      - name: Cache Next.js build
        uses: actions/cache@v5
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.ts','**/*.tsx') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}-

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Build
        run: npm run build

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run unit tests
        run: npm run test:run

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: validate

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: srobinhood_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/srobinhood_e2e?schema=public"
      ALLOW_DEV_LOGIN: "true"
      # Alpaca keys needed at runtime for live price data in E2E tests.
      # Add these to Settings → Secrets → Dependabot so Dependabot PRs can also run E2E.
      ALPACA_API_KEY_ID: ${{ secrets.ALPACA_API_KEY_ID }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma migrate deploy

      - name: Build app
        run: npm run build

      - name: Run E2E tests
        run: |
          npm run start &
          npx wait-on http://localhost:3000 --timeout 30000
          PLAYWRIGHT_BASE_URL=http://localhost:3000 npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
